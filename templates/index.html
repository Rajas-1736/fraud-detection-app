<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 50px; }
        .card { max-width: 500px; margin: auto; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .fraud { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .normal { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        #result { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">🔍 Credit Card Fraud Detection</h2>
                
                <form id="fraudForm">
                    <div class="mb-3">
                        <label for="time" class="form-label">Transaction Time (seconds since first txn):</label>
                        <input type="number" class="form-control" id="time" name="Time" placeholder="e.g., 0" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Transaction Amount ($):</label>
                        <input type="number" class="form-control" id="amount" name="Amount" placeholder="e.g., 100" step="0.01" min="0" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Check Fraud</button>
                </form>

                <div id="result" class="result"></div>

                {% if prediction_text %}
                <div class="result {{ result_class or '' }}">{{ prediction_text }}</div>
                {% endif %}
            </div>
        </div>

        <div class="text-center mt-4 text-muted">
            <small>Powered by ML Model (30 features: Time + PCA V1-28 + Amount)</small>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#fraudForm').on('submit', function(e) {
                e.preventDefault(); // Prevent page reload
                
                var time = $('#time').val();
                var amount = $('#amount').val();
                
                if (!time || !amount) {
                    alert('Please enter both Time and Amount');
                    return;
                }
                
                $('#result').hide().removeClass('fraud normal error');
                $('.btn-primary').text('Analyzing...').prop('disabled', true);
                
                $.ajax({
                    url: '/predict',
                    type: 'POST',
                    data: {Time: time, Amount: amount},
                    success: function(response) {
                        // Extract result from rendered HTML (parse the h3 or result div)
                        var parser = new DOMParser();
                        var doc = parser.parseFromString(response, 'text/html');
                        var predText = doc.querySelector('.result, h3')?.textContent || 'Normal Transaction';
                        var predClass = doc.querySelector('.result')?.className.match(/fraud|normal|error/)?.[0] || 'normal';
                        
                        $('#result')
                            .addClass(predClass)
                            .text(predText)
                            .fadeIn(500);
                    },
                    error: function() {
                        $('#result')
                            .addClass('error')
                            .text('Error: Could not connect to prediction service. Check console.')
                            .fadeIn(500);
                    },
                    complete: function() {
                        $('.btn-primary').text('Check Fraud').prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
